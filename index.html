<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReBites · Site en construction</title>
  <meta name="description" content="ReBites arrive bientôt. Programme de fidélité sans app, sans matériel, actif en 10 minutes.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    html{font-size:16px}
    body{
      font-family:'Plus Jakarta Sans',sans-serif;
      color:#111827;background:#F7F8FC;
      line-height:1.7;overflow-x:hidden;
      -webkit-font-smoothing:antialiased;
      min-height:100vh;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      position:relative;
    }

    /* Grain overlay */
    body::after{
      content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;opacity:0.022;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat:repeat;background-size:150px;
    }

    /* Blobs décoratifs */
    .blob{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
    .blob-1{width:500px;height:500px;background:rgba(59,130,246,0.08);top:-150px;right:-100px}
    .blob-2{width:400px;height:400px;background:rgba(16,185,129,0.06);bottom:-100px;left:-80px}
    .blob-3{width:300px;height:300px;background:rgba(59,130,246,0.05);bottom:100px;right:10%}

    /* Container */
    .wrapper{
      position:relative;z-index:1;
      text-align:center;
      max-width:600px;
      padding:40px 24px;
    }

    /* Logo */
    .logo{
      font-family:'DM Serif Display',serif;
      font-size:2.2rem;color:#0B1425;
      letter-spacing:-.01em;
      margin-bottom:48px;
      animation:fadeDown .8s ease-out both;
    }
    .logo span{color:#3B82F6}

    /* Icône construction */
    .icon-wrapper{
      width:100px;height:100px;
      margin:0 auto 32px;
      background:rgba(59,130,246,0.08);
      border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      animation:fadeUp .8s ease-out .2s both;
    }
    .icon-wrapper svg{
      animation:gear-spin 8s linear infinite;
    }

    /* Titre */
    h1{
      font-family:'DM Serif Display',serif;
      font-weight:400;line-height:1.2;
      color:#0B1425;
      font-size:clamp(1.8rem,5vw,2.8rem);
      margin-bottom:16px;
      animation:fadeUp .8s ease-out .3s both;
    }

    /* Sous-titre */
    .subtitle{
      color:#6B7280;
      font-size:1.05rem;
      max-width:460px;
      margin:0 auto 40px;
      animation:fadeUp .8s ease-out .4s both;
    }

    /* Barre de progression */
    .progress-bar{
      width:100%;max-width:320px;
      height:6px;
      background:rgba(17,24,39,0.06);
      border-radius:100px;
      margin:0 auto 12px;
      overflow:hidden;
      animation:fadeUp .8s ease-out .5s both;
    }
    .progress-fill{
      height:100%;width:0;
      background:linear-gradient(90deg,#3B82F6,#60A5FA);
      border-radius:100px;
      animation:loading 2.5s ease-out .8s forwards;
    }
    .progress-label{
      font-size:.8rem;
      color:#9CA3AF;
      font-weight:500;
      animation:fadeUp .8s ease-out .5s both;
      margin-bottom:40px;
    }

    /* Notification input */
    .notify-box{
      animation:fadeUp .8s ease-out .6s both;
    }
    .notify-box p{
      font-size:.9rem;
      font-weight:600;
      color:#111827;
      margin-bottom:12px;
    }
    .notify-form{
      display:flex;gap:8px;
      max-width:400px;
      margin:0 auto;
    }
    .notify-form input{
      flex:1;
      padding:12px 18px;
      border:1.5px solid rgba(17,24,39,0.10);
      border-radius:100px;
      font-size:.9rem;
      font-family:inherit;
      background:#fff;
      outline:none;
      transition:border-color .3s;
    }
    .notify-form input:focus{
      border-color:#3B82F6;
    }
    .notify-form button{
      padding:12px 24px;
      background:#111827;
      color:#fff;
      border:none;
      border-radius:100px;
      font-weight:600;
      font-size:.85rem;
      font-family:inherit;
      cursor:pointer;
      transition:all .3s;
      white-space:nowrap;
    }
    .notify-form button:hover{
      background:#030712;
      transform:translateY(-2px);
      box-shadow:0 4px 12px rgba(17,24,39,.18);
    }

    /* Réseaux sociaux */
    .socials{
      margin-top:48px;
      display:flex;gap:16px;
      justify-content:center;
      animation:fadeUp .8s ease-out .7s both;
    }
    .socials a{
      width:44px;height:44px;
      display:flex;align-items:center;justify-content:center;
      background:#fff;
      border:1.5px solid rgba(17,24,39,0.08);
      border-radius:50%;
      color:#6B7280;
      transition:all .3s;
      text-decoration:none;
    }
    .socials a:hover{
      border-color:rgba(17,24,39,0.20);
      color:#111827;
      transform:translateY(-2px);
      box-shadow:0 4px 12px rgba(17,24,39,.06);
    }

    /* Footer */
    .footer-text{
      margin-top:48px;
      font-size:.78rem;
      color:#9CA3AF;
      animation:fadeUp .8s ease-out .8s both;
    }

    /* Animations */
    @keyframes fadeDown{
      from{opacity:0;transform:translateY(-20px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(25px)}
      to{opacity:1;transform:translateY(0)}
    }
    @keyframes loading{
      to{width:65%}
    }
    @keyframes gear-spin{
      from{transform:rotate(0deg)}
      to{transform:rotate(360deg)}
    }

    /* Responsive */
    @media(max-width:480px){
      .notify-form{flex-direction:column}
      .notify-form input,.notify-form button{width:100%}
    }
  </style>
</head>
<body>

  <!-- Blobs décoratifs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="wrapper">

    <!-- Logo -->
    <div class="logo">Re<span>Bites</span></div>

    <!-- Icône -->
    <div class="icon-wrapper">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="#3B82F6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </div>

    <!-- Titre -->
    <h1>Site en construction</h1>
    <p class="subtitle">Nous travaillons dur pour vous offrir la meilleure expérience. ReBites arrive très bientôt !</p>

    <!-- Progression -->
    <div class="progress-bar"><div class="progress-fill"></div></div>
    <p class="progress-label">Progression estimée : 65%</p>

    <!-- Notification -->
    <div class="notify-box">
      <p>Soyez les premiers informés du lancement</p>
      <form class="notify-form" onsubmit="handleSubmit(event)">
        <input type="email" placeholder="votre@email.com" required>
        <button type="submit">Me notifier</button>
      </form>
    </div>

    <!-- Réseaux sociaux -->
    <div class="socials">
      <a href="#" aria-label="Instagram">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
      </a>
      <a href="#" aria-label="LinkedIn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
      </a>
      <a href="mailto:mehdilentz@gmail.com" aria-label="Email">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      </a>
    </div>

    <p class="footer-text">&copy; 2026 ReBites. Tous droits réservés.</p>
  </div>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      const input = e.target.querySelector('input');
      const btn = e.target.querySelector('button');
      const val = input.value.trim().toLowerCase();

      // Mot de passe secret : ton email → accès à la landing page
      if (val === 'mehdilentz@gmail.com') {
        window.location.href = 'landing.html';
        return;
      }

      // Sinon, stocker l'email en localStorage + confirmation
      var emails = JSON.parse(localStorage.getItem('rebites_emails') || '[]');
      if (!emails.includes(val)) {
        emails.push(val);
        localStorage.setItem('rebites_emails', JSON.stringify(emails));
      }
      btn.textContent = 'Merci !';
      btn.style.background = '#10B981';
      input.disabled = true;
      btn.disabled = true;
    }
  </script>
</body>
</html>
